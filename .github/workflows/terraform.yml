name: Terraform CI

# Triggered on every pull request and on direct pushes to main.
# Goal: catch formatting, configuration, and security issues before
# they reach a deployed environment.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  TF_VERSION: "1.7.5"
  TFLINT_VERSION: "v0.50.2"

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Format Check
  # Enforces consistent HCL formatting. Fails if any file differs from
  # canonical format. The --diff flag prints exactly which lines changed.
  # ---------------------------------------------------------------------------
  fmt:
    name: Terraform Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Check formatting (all .tf files)
        run: terraform fmt --check --recursive --diff

  # ---------------------------------------------------------------------------
  # Job 2: Validate — Dev
  # Validates the dev composition against all module schemas.
  # -backend=false skips remote state config that requires AWS credentials.
  # ---------------------------------------------------------------------------
  validate-dev:
    name: Terraform Validate (dev)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  # ---------------------------------------------------------------------------
  # Job 3: Validate — Prod
  # Same as dev validation but for the production composition.
  # Required variables with no default must be stubbed for static validation.
  # ---------------------------------------------------------------------------
  validate-prod:
    name: Terraform Validate (prod)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/prod
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate -var="container_image=placeholder" -var="alarm_email=ci@example.com" -var="db_password=placeholder"

  # ---------------------------------------------------------------------------
  # Job 4: Validate — Bootstrap
  # Validates the bootstrap workspace (S3 bucket + DynamoDB table) in
  # isolation. No required variables — uses defaults.
  # ---------------------------------------------------------------------------
  validate-bootstrap:
    name: Terraform Validate (bootstrap)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bootstrap
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  # ---------------------------------------------------------------------------
  # Job 4: TFLint
  # Provider-specific linting. Catches deprecated arguments, missing required
  # fields, and AWS-specific best practice violations that validate misses.
  # ---------------------------------------------------------------------------
  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}

      - name: Run TFLint — ecs-service
        run: |
          tflint --init
          tflint --format=compact
        working-directory: modules/ecs-service

      - name: Run TFLint — aurora-postgres
        run: |
          tflint --init
          tflint --format=compact
        working-directory: modules/aurora-postgres

      - name: Run TFLint — observability
        run: |
          tflint --init
          tflint --format=compact
        working-directory: modules/observability

      - name: Run TFLint — security-groups
        run: |
          tflint --init
          tflint --format=compact
        working-directory: modules/security-groups

      - name: Run TFLint — alb
        run: |
          tflint --init
          tflint --format=compact
        working-directory: modules/alb

      - name: Run TFLint — secrets
        run: |
          tflint --init
          tflint --format=compact
        working-directory: modules/secrets

  # ---------------------------------------------------------------------------
  # Job 5: Security Scan — tfsec
  # Static analysis for known AWS security misconfigurations.
  # HIGH and CRITICAL severity findings fail the build.
  # ---------------------------------------------------------------------------
  security:
    name: Security Scan (tfsec)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          soft_fail: false
          minimum_severity: HIGH
          format: lovely
          additional_args: --exclude-downloaded-modules

  # ---------------------------------------------------------------------------
  # Job 6: Checkov — CIS AWS Benchmark + general IaC policy checks
  # Soft-fail during initial adoption; promote to hard-fail once baseline
  # findings have been triaged and suppressed with inline justification.
  # ---------------------------------------------------------------------------
  checkov:
    name: Checkov Policy Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          soft_fail: true
          output_format: cli
          skip_check: CKV_AWS_7,CKV2_AWS_5
          # CKV_AWS_7:  KMS key rotation — project uses AWS-managed keys, not CMK
          # CKV2_AWS_5: SG not attached — SGs attached via module outputs, not inline
